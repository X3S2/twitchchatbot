services:

  # ── Reverse Proxy + Frontend ─────────────────────────────────
  tcb-nginx:
    image: nginx:1.27-alpine
    container_name: tcb-nginx
    restart: unless-stopped
    ports:
      - "${TCB_EXTERNAL_PORT:-3080}:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - frontend_build:/usr/share/nginx/html:ro
    depends_on:
      - tcb-api
    networks:
      - tcb-net

  # ── FastAPI Backend ───────────────────────────────────────────
  tcb-api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: tcb-api
    restart: unless-stopped
    expose:
      - "8000"
    environment:
      DATABASE_URL: ${DATABASE_URL}
      REDIS_URL: ${REDIS_URL}
      JWT_SECRET_KEY: ${JWT_SECRET_KEY}
      FERNET_KEY: ${FERNET_KEY}
      APP_PUBLIC_URL: ${APP_PUBLIC_URL}
      BOT_MANAGER_URL: ${BOT_MANAGER_URL}
      INTERNAL_API_KEY: ${INTERNAL_API_KEY}
    depends_on:
      tcb-postgres:
        condition: service_healthy
      tcb-redis:
        condition: service_healthy
    volumes:
      - ./backups:/app/backups
    networks:
      - tcb-net

  # ── IRC Bot Manager ───────────────────────────────────────────
  tcb-botmanager:
    build:
      context: ./bot-manager
      dockerfile: Dockerfile
    container_name: tcb-botmanager
    restart: unless-stopped
    expose:
      - "8001"
    environment:
      REDIS_URL: ${REDIS_URL}
      FERNET_KEY: ${FERNET_KEY}
      API_URL: http://tcb-api:8000
      INTERNAL_API_KEY: ${INTERNAL_API_KEY}
    depends_on:
      tcb-postgres:
        condition: service_healthy
      tcb-redis:
        condition: service_healthy
    networks:
      - tcb-net

  # ── PostgreSQL 16 ─────────────────────────────────────────────
  tcb-postgres:
    image: postgres:16-alpine
    container_name: tcb-postgres
    restart: unless-stopped
    expose:
      - "5432"
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-tcb}
      POSTGRES_USER: ${POSTGRES_USER:-tcb_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./backend/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-tcb_user} -d ${POSTGRES_DB:-tcb}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - tcb-net

  # ── Redis 7 ───────────────────────────────────────────────────
  tcb-redis:
    image: redis:7-alpine
    container_name: tcb-redis
    restart: unless-stopped
    expose:
      - "6379"
    command: redis-server --save 60 1 --loglevel warning
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - tcb-net

  # ── Frontend Build (einmalig, legt Dateien in Volume ab) ──────
  tcb-frontend-build:
    build:
      context: ./frontend
      dockerfile: Dockerfile.build
    container_name: tcb-frontend-build
    volumes:
      - frontend_build:/output
    profiles:
      - build

volumes:
  postgres_data:
    name: tcb_postgres_data
  redis_data:
    name: tcb_redis_data
  frontend_build:
    name: tcb_frontend_build

networks:
  tcb-net:
    name: tcb-net
    driver: bridge
